<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Document</title>
  </head>
  <body>
    <h1 class="header">Pomodoro Timer</h1>
    <section class="pomodoro">
      <h2 id="mode-label">Work</h2>
      <button class="themeToggle">
        <img src="icons\Day_night.png" alt="Toggle theme" />
      </button>
      <div id="display">25:00</div>
      <div class="control">
        <button id="start">Start</button>
        <button id="pause">Pause</button>
        <button id="reset">Reset</button>
        <button id="workOrBreak">Work/ Break</button>
        <div class="duration-control">
          <button id="workPlus">Work/ Break +</button>
          <button id="workMinus">Work/ Break -</button>
        </div>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
